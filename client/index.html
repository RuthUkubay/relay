<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
    }

    /* ── Login ── */
    #login-section {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    #login-section h1 { margin-bottom: 1rem; font-size: 1.5rem; }

    /* ── Chat shell ── */
    #chat-section {
      display: none;
      flex-direction: column;
      width: 620px;
      height: 600px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #e0e0e0;
    }
    #chat-header h1 { font-size: 1.2rem; }
    #user-label { font-size: 0.8rem; color: #888; }

    /* ── Two-column layout ── */
    #chat-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Rooms sidebar ── */
    #rooms-sidebar {
      width: 150px;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      padding: 0.75rem 0;
      flex-shrink: 0;
    }
    #rooms-label {
      padding: 0 0.75rem 0.4rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #rooms-list { list-style: none; }
    #rooms-list li {
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      font-size: 0.88rem;
      border-radius: 4px;
      margin: 0 0.25rem;
      color: #444;
    }
    #rooms-list li:hover { background: #f5f5f5; }
    #rooms-list li.active { background: #ede9fe; color: #4f46e5; font-weight: 600; }

    /* ── Message pane ── */
    #chat-main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      padding: 0.75rem;
    }
    #room-header {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
      color: #333;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 0.5rem;
      margin-bottom: 0.5rem;
    }
    #messages li {
      padding: 0.3rem 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.88rem;
    }

    /* ── Input row ── */
    form { display: flex; gap: 0.5rem; }
    input[type="text"] {
      flex: 1;
      padding: 0.45rem 0.7rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    button {
      padding: 0.45rem 1rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>

  <div id="login-section">
    <h1>Relay</h1>
    <form id="login-form">
      <input id="login-input" type="text" placeholder="Enter your name" required />
      <button type="submit">Join</button>
    </form>
  </div>

  <div id="chat-section">
    <div id="chat-header">
      <h1>Relay</h1>
      <span id="user-label"></span>
    </div>

    <div id="chat-layout">
      <aside id="rooms-sidebar">
        <div id="rooms-label">Rooms</div>
        <ul id="rooms-list"></ul>
      </aside>

      <div id="chat-main">
        <div id="room-header"></div>
        <ul id="messages"></ul>
        <form id="message-form">
          <input id="message-input" type="text" placeholder="Type a message…" required />
          <button type="submit">Send</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
